<section class="container py-5">


    <div class="card shadow border-0 mx-auto" style="max-width:500px;">


        <div class="card-body">


            <h3 class="mb-4 text-center">

                Change Password

            </h3>



            @if(successMessage){

            <div class="alert alert-success">

                {{successMessage}}

            </div>

            }



            @if(errorMessage){

            <div class="alert alert-danger">

                {{errorMessage}}

            </div>

            }





            <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">



                <div class="mb-3">

                    <label class="form-label">

                        Current Password

                    </label>


                    <input type="password" class="form-control" formControlName="current_password">


                </div>





                <div class="mb-3">

                    <label class="form-label">

                        New Password

                    </label>


                    <input type="password" class="form-control" formControlName="new_password">


                </div>





                <div class="mb-3">

                    <label class="form-label">

                        Confirm Password

                    </label>


                    <input type="password" class="form-control" formControlName="confirm_password">


                </div>





                <button class="btn btn-warning w-100">

                    Change Password

                </button>



            </form>


        </div>

    </div>


</section>
