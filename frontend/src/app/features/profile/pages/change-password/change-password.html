<section class="container py-5">

    <h2 class="mb-4">

        Change Password

    </h2>

    <form
        [formGroup]="passwordForm"
        (ngSubmit)="save()">

        <div class="mb-3">

            <label class="form-label">

                Current Password

            </label>

            <input
                type="password"
                class="form-control"
                formControlName="current_password">

        </div>

        <div class="mb-3">

            <label class="form-label">

                New Password

            </label>

            <input
                type="password"
                class="form-control"
                formControlName="new_password">

        </div>

        <div class="mb-4">

            <label class="form-label">

                Confirm Password

            </label>

            <input
                type="password"
                class="form-control"
                formControlName="confirm_password">

        </div>

        <button
            class="btn btn-primary"
            type="submit">

            Change Password

        </button>

    </form>

</section>
