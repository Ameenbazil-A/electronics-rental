<div class="card h-100 shadow-sm">

    <img [src]="product().image || 'https://placehold.co/600x400?text=No+Image'" class="card-img-top product-image"
        alt="Product Image">

    <div class="card-body">

        <h5 class="card-title">
            {{ product().name }}
        </h5>

        <p class="text-muted mb-1">
            {{ product().brand }}
        </p>

        <p class="text-muted">
            {{ product().category_name }}
        </p>

        <h6 class="text-primary">
            ₹{{ product().daily_rent }} / day
        </h6>

        <span class="badge" [class.bg-success]="product().available" [class.bg-danger]="!product().available">

            {{ product().available ? 'Available' : 'Not Available' }}

        </span>

    </div>

    <div class="card-footer bg-white">

        <div class="d-grid gap-2">

            <a class="btn btn-outline-primary" [routerLink]="['/products', product().id]">

                View Details

            </a>

            <a class="btn btn-success" [routerLink]="['/bookings/create', product().id]"
                [class.disabled]="!product().available">

                Rent Now

            </a>

        </div>

    </div>

</div>
