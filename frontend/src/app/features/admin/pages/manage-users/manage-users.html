<section class="container py-5">

    <h2 class="mb-4">

        Manage Users

    </h2>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead>

                    <tr>

                        <th>Username</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody>

                    @for (user of users; track user.id) {

                        <tr>

                            <td>{{ user.username }}</td>

                            <td>{{ user.email }}</td>

                            <td>{{ user.phone }}</td>

                            <td>

                                <span class="badge bg-primary">

                                    {{ user.role }}

                                </span>

                            </td>

                            <td>

                                <span
                                    class="badge"
                                    [class.bg-success]="user.is_active"
                                    [class.bg-danger]="!user.is_active">

                                    {{ user.is_active ? 'Active' : 'Inactive' }}

                                </span>

                            </td>

                        </tr>

                    }

                </tbody>

            </table>

        </div>

    </div>

</section>
