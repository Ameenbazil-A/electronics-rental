<form
    [formGroup]="productForm"
    (ngSubmit)="saveProduct()">

    <div class="row">

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Product Name

            </label>

            <input
                type="text"
                class="form-control"
                formControlName="name">

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Brand

            </label>

            <input
                type="text"
                class="form-control"
                formControlName="brand">

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Model

            </label>

            <input
                type="text"
                class="form-control"
                formControlName="model_name">

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Category

            </label>

            <select
                class="form-select"
                formControlName="category">

                <option value="">
                    Select Category
                </option>

                @for (category of categories; track category.id) {

                    <option [value]="category.id">

                        {{ category.name }}

                    </option>

                }

            </select>

        </div>

        <div class="col-md-4 mb-3">

            <label class="form-label">

                Daily Rent

            </label>

            <input
                type="number"
                class="form-control"
                formControlName="daily_rent">

        </div>

        <div class="col-md-4 mb-3">

            <label class="form-label">

                Weekly Rent

            </label>

            <input
                type="number"
                class="form-control"
                formControlName="weekly_rent">

        </div>

        <div class="col-md-4 mb-3">

            <label class="form-label">

                Monthly Rent

            </label>

            <input
                type="number"
                class="form-control"
                formControlName="monthly_rent">

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Security Deposit

            </label>

            <input
                type="number"
                class="form-control"
                formControlName="security_deposit">

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Stock

            </label>

            <input
                type="number"
                class="form-control"
                formControlName="stock">

        </div>

        <div class="col-12 mb-3">

            <label class="form-label">

                Description

            </label>

            <textarea
                rows="4"
                class="form-control"
                formControlName="description">

            </textarea>

        </div>

        <div class="col-12 mb-3">

    <label class="form-label">

        Product Image

    </label>

    <input
        type="file"
        class="form-control"
        accept="image/*"
        (change)="onImageSelected($event)">

    </div>

    <div
        class="col-12 mb-3"
        *ngIf="previewUrl">

        <img
            [src]="previewUrl"
            class="img-thumbnail"
            style="max-width:250px">

    </div>


        <div class="col-12 mb-3">

            <div class="form-check">

                <input
                    type="checkbox"
                    class="form-check-input"
                    formControlName="available">

                <label class="form-check-label">

                    Available

                </label>

            </div>

        </div>

        <div class="col-12">

            <button
                class="btn btn-primary"
                type="submit">

                    {{ isEditMode ? 'Update Product' : 'Save Product' }}

            </button>

        </div>

    </div>

</form>
