<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">

                        Create Account

                    </h2>

                    <form (ngSubmit)="register()">

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                [(ngModel)]="form.username"
                                name="username"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                [(ngModel)]="form.email"
                                name="email"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                [(ngModel)]="form.phone"
                                name="phone">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                [(ngModel)]="form.password"
                                name="password"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                [(ngModel)]="form.confirmPassword"
                                name="confirmPassword"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                            [disabled]="!form.username || !form.email || !form.password || !form.confirmPassword">

                            Register

                        </button>


                        <div class="text-center mt-3">

                            Already have an account?

                            <a routerLink="/login">

                                Login

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>
